name: Deploy to Mini PC

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Mini PC via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MINI_PC_HOST }}
          username: ${{ secrets.MINI_PC_USER }}
          key: ${{ secrets.MINI_PC_SSH_KEY }}
          port: ${{ secrets.MINI_PC_PORT || 22 }}
          script: |
            cd ~/SalaryLens

            # 最新のコードを取得
            git pull origin main

            # .envファイルをGitHub Secretsから生成
            cat > .env << EOF
            DATABASE_URL="${{ secrets.DATABASE_URL }}"
            POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            EOF

            # Dockerイメージを再ビルド
            docker compose -f docker-compose.prod.yml build

            # コンテナを再起動
            docker compose -f docker-compose.prod.yml up -d

            # データベースマイグレーション実行
            docker exec salarylens-app-prod npx prisma migrate deploy

            # 古いイメージを削除（ディスク節約）
            docker image prune -f

            echo "Deployment completed successfully!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
          fi
