version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: salarylens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salarylens
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salarylens-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: salarylens-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/salarylens
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - salarylens-network

  nginx:
    image: nginx:alpine
    container_name: salarylens-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - salarylens-network

volumes:
  postgres_data:
    driver: local

networks:
  salarylens-network:
    driver: bridge
