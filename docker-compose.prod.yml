version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: salarylens-postgres-prod
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-salarylens}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salarylens-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: salarylens-app-prod
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - salarylens-network

  nginx:
    image: nginx:alpine
    container_name: salarylens-nginx-prod
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - salarylens-network

volumes:
  postgres_data:
    driver: local

networks:
  salarylens-network:
    driver: bridge
